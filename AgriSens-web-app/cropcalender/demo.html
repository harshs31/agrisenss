<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Calendar & Planting Guide for Indian States</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #4caf50;
            --light-green: #c8e6c9;
            --harvest-color: #ffd54f;
            --border-radius: 8px;
            --box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
            background-color: #f9f9f9;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            
           
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        
        }
        
        h1 {
            color: var(--primary-color);
            margin: 0;
            
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        select {
            padding: 10px;
            border-radius: var(--border-radius);
            border: 1px solid #ccc;
            background-color: white;
            font-size: 16px;
            min-width: 200px;
        }
        
        .crop-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-card {
            flex: 1;
            min-width: 200px;
            background-color: #f9f9f9;
            border-left: 4px solid var(--primary-color);
            border-radius: var(--border-radius);
            padding: 15px;
        }
        
        .info-card h3 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 16px;
        }
        
        .info-card p {
            margin: 0;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .timeline {
            margin: 40px 0;
        }
        
        .timeline h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .timeline-container {
            position: relative;
            margin-bottom: 30px;
        }
        
        .timeline-line {
            height: 4px;
            background-color: var(--primary-color);
            position: relative;
        }
        
        .timeline-points {
            display: flex;
            justify-content: space-between;
            position: absolute;
            width: 100%;
            top: -8px;
        }
        
        .timeline-point {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: var(--primary-color);
        }
        
        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        
        .timeline-label {
            text-align: center;
            font-size: 14px;
            max-width: 100px;
        }
        
        .timeline-date {
            color: #666;
            font-size: 12px;
        }
        
        .calendar {
            margin: 40px 0;
        }
        
        .calendar-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: var(--border-radius) var(--border-radius) 0 0;
        }
        
        .calendar-header h2 {
            margin: 0;
        }
        
        .calendar-grid {
            border: 1px solid #ddd;
            border-top: none;
        }
        
        .calendar-months {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            background-color: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }
        
        .calendar-month {
            text-align: center;
            padding: 10px 0;
            border-right: 1px solid #ddd;
            font-weight: bold;
        }
        
        .calendar-month:last-child {
            border-right: none;
        }
        
        .calendar-row {
            display: grid;
            grid-template-columns: 100px repeat(12, 1fr);
            border-bottom: 1px solid #ddd;
        }
        
        .calendar-row:last-child {
            border-bottom: none;
        }
        
        .calendar-row-label {
            padding: 15px 10px;
            background-color: #f9f9f9;
            font-weight: bold;
            border-right: 1px solid #ddd;
            display: flex;
            align-items: center;
        }
        
        .calendar-cell {
            height: 40px;
            border-right: 1px solid #ddd;
        }
        
        .calendar-cell:last-child {
            border-right: none;
        }
        
        .calendar-cell.sowing {
            background-color: var(--light-green);
        }
        
        .calendar-cell.growing {
            background-color: var(--secondary-color);
        }
        
        .calendar-cell.harvesting {
            background-color: var(--harvest-color);
        }
        
        .calendar-legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        
        .legend-color {
            width: 15px;
            height: 15px;
        }
        
        .legend-color.sowing {
            background-color: var(--light-green);
        }
        
        .legend-color.growing {
            background-color: var(--secondary-color);
        }
        
        .legend-color.harvesting {
            background-color: var(--harvest-color);
        }
        
        .tips {
            background-color: var(--light-green);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-top: 30px;
        }
        
        .tips h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
            margin-top: 0;
        }
        
        .tips-icon {
            font-size: 24px;
        }
        
        .tips ul {
            padding-left: 20px;
        }
        
        .tips li {
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            
            .calendar-months {
                display: none;
            }
            
            .calendar-row {
                grid-template-columns: 100px 1fr;
                margin-bottom: 20px;
            }
            
            .calendar-cell {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
                padding: 10px;
                height: auto;
                border-bottom: 1px solid #ddd;
            }
            
            .calendar-month-label {
                font-weight: bold;
                margin-right: 5px;
            }
        }
    </style>
</head>

        // Get DOM elements
        const stateSelect = document.getElementById('stateSelect');
        const cropSelect = document.getElementById('cropSelect');
        const cropDetails = document.getElementById('cropDetails');

        // Initialize crop selection based on state
        stateSelect.addEventListener('change', function() {
            const selectedState = this.value;
            cropSelect.innerHTML = '<option value="">Select a Crop</option>';
            
            if (selectedState && cropData[selectedState]) {
                const crops = Object.keys(cropData[selectedState]);
                crops.forEach(crop => {
                    const option = document.createElement('option');
                    option.value = crop;
                    option.textContent = cropData[selectedState][crop].name;
                    cropSelect.appendChild(option);
                });
            }
        });

        // Display crop details when a crop is selected
        cropSelect.addEventListener('change', function() {
            const selectedState = stateSelect.value;
            const selectedCrop = this.value;
            
            if (selectedState && selectedCrop && cropData[selectedState][selectedCrop]) {
                displayCropDetails(selectedState, selectedCrop);
            } else {
                cropDetails.innerHTML = '<div class="loading">Please select a state and crop to view details</div>';
            }
        });

        // Function to display crop details
        function displayCropDetails(state, crop) {
            const cropInfo = cropData[state][crop];
            
            // Format months for calendar
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            let html = `
                <h2>${cropInfo.name} in ${state.charAt(0).toUpperCase() + state.slice(1)}</h2>
                
                <div class="crop-info">
                    <div class="info-card">
                        <h3>Sowing Window</h3>
                        <p>${cropInfo.sowingWindow}</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>Transplanting Window</h3>
                        <p>${cropInfo.transplantingWindow}</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>Harvest Window</h3>
                        <p>${cropInfo.harvestWindow}</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>Days to Maturity</h3>
                        <p>${cropInfo.daysToMaturity}</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>Average Yield</h3>
                        <p>${cropInfo.averageYield}</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>Plant Spacing</h3>
                        <p>${cropInfo.plantSpacing}</p>
                    </div>
                </div>
                
                <div class="timeline">
                    <h2>Growing Timeline</h2>
                    <div class="timeline-container">
                        <div class="timeline-points">
                            <div class="timeline-point"></div>
                            <div class="timeline-point"></div>
                            <div class="timeline-point"></div>
                            <div class="timeline-point"></div>
                            <div class="timeline-point"></div>
                        </div>
                        <div class="timeline-line"></div>
                        <div class="timeline-labels">
                            <div class="timeline-label">
                                <div>Planting</div>
                                <div class="timeline-date">${cropInfo.timeline.planting}</div>
                            </div>
                            <div class="timeline-label">
                                <div>Growing</div>
                                <div class="timeline-date">${cropInfo.timeline.growing}</div>
                            </div>
                            <div class="timeline-label">
                                <div>Development</div>
                                <div class="timeline-date">${cropInfo.timeline.development}</div>
                            </div>
                            <div class="timeline-label">
                                <div>Pre-Harvest</div>
                                <div class="timeline-date">${cropInfo.timeline.preHarvest}</div>
                            </div>
                            <div class="timeline-label">
                                <div>Harvest</div>
                                <div class="timeline-date">${cropInfo.timeline.harvest}</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="calendar">
                    <div class="calendar-header">
                        <h2>Annual Growing Calendar for ${cropInfo.name}</h2>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-months">
                            ${monthNames.map(month => `<div class="calendar-month">${month}</div>`).join('')}
                        </div>
                        
                        <div class="calendar-row">
                            <div class="calendar-row-label">Sowing</div>
                            ${generateCalendarCells(cropInfo.calendar.sowing, 'sowing')}
                        </div>
                        
                        <div class="calendar-row">
                            <div class="calendar-row-label">Growing</div>
                            ${generateCalendarCells(cropInfo.calendar.growing, 'growing')}
                        </div>
                        
                        <div class="calendar-row">
                            <div class="calendar-row-label">Harvesting</div>
                            ${generateCalendarCells(cropInfo.calendar.harvesting, 'harvesting')}
                        </div>
                    </div>
                    
                    <div class="calendar-legend">
                        <div class="legend-item">
                            <div class="legend-color sowing"></div>
                            <div>Sowing/Planting</div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color growing"></div>
                            <div>Growing Period</div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color harvesting"></div>
                            <div>Harvesting Period</div>
                        </div>
                    </div>
                </div>
                
                <div class="tips">
                    <h2><span class="tips-icon">💡</span> Growing Tips for ${cropInfo.name}</h2>
                    <ul>
                        ${cropInfo.tips.map(tip => `<li>${tip}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            cropDetails.innerHTML = html;
        }
        
        // Function to generate calendar cells
        function generateCalendarCells(activeMonths, className) {
            let cells = '';
            
            for (let i = 1; i <= 12; i++) {
                const isActive = activeMonths.includes(i);
                cells += `<div class="calendar-cell ${isActive ? className : ''}"></div>`;
            }
            
            return cells;
        }
    </script>
